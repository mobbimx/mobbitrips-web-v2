/* ============================================================
   MobbiTrips — Design Tokens
   Casa en todas partes · cálido, editorial, liquid glass
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@400;600&display=swap');

@font-face {
  font-family: 'Comfortaa';
  src: url('./fonts/Comfortaa-VariableFont_wght.ttf') format('truetype-variations'),
       url('./fonts/Comfortaa-VariableFont_wght.ttf') format('truetype'),
       url('../fonts/Comfortaa-VariableFont_wght.ttf') format('truetype-variations'),
       url('../fonts/Comfortaa-VariableFont_wght.ttf') format('truetype'),
       url('../../fonts/Comfortaa-VariableFont_wght.ttf') format('truetype-variations'),
       url('../../fonts/Comfortaa-VariableFont_wght.ttf') format('truetype');
  font-weight: 300 700;
  font-style: normal;
  font-display: swap;
}

:root {
  /* ---------- Coral (alma de la marca) ---------- */
  --coral-50:  #FEF5F4;
  --coral-100: #FDE8E6;
  --coral-300: #F9CFCC;
  --coral-500: #F5B0AD;
  --coral-700: #F08884;
  --coral-900: #ED6864;  /* PRIMARY */
  --coral-950: #C14744;

  /* ---------- Gray cálido (nunca frío) ---------- */
  --gray-100: #E8E8E6;
  --gray-200: #DCDCDA;
  --gray-300: #C4C4C4;
  --gray-500: #9A9999;
  --gray-700: #706F6F;  /* Corporativo */
  --gray-900: #2D2D2D;
  --gray-950: #1F1F1F;

  /* ---------- Fondos ---------- */
  --cream:     #FAF7F2;  /* fondo principal — nunca blanco puro */
  --white:     #FFFFFF;
  --charcoal:  #1F1F1F;

  /* ---------- Acentos (uso mínimo) ---------- */
  --mustard:   #E8B547;
  --sage:      #8FA68E;
  --sky-warm:  #B5CDD6;

  /* ---------- Gradientes ---------- */
  --gradient-warm:        linear-gradient(135deg, #FAF7F2 0%, #FDE8E6 100%);
  --gradient-coral-soft:  linear-gradient(135deg, #FDE8E6 0%, #F5B0AD 100%);
  --gradient-sunset:      linear-gradient(180deg, #FAF7F2 0%, #F9CFCC 50%, #F08884 100%);
  --gradient-dusk:        linear-gradient(180deg, #F5B0AD 0%, #706F6F 70%, #1F1F1F 100%);

  /* ---------- Semantic ---------- */
  --bg:         var(--cream);
  --bg-elev:    var(--white);
  --bg-inv:     var(--charcoal);
  --fg:         var(--gray-900);
  --fg-muted:   var(--gray-700);
  --fg-subtle:  var(--gray-500);
  --fg-inv:     var(--cream);
  --border:     var(--gray-200);
  --border-strong: var(--gray-300);
  --accent:     var(--coral-900);
  --accent-hover: var(--coral-950);
  --accent-soft: var(--coral-100);

  /* ---------- Typography families ---------- */
  --font-display: 'Comfortaa', ui-rounded, system-ui, sans-serif;
  --font-body:    'Inter', system-ui, -apple-system, sans-serif;
  --font-script:  'Caveat', 'Brush Script MT', cursive;

  /* ---------- Spacing (base 4px) ---------- */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;
  --space-32: 128px;
  --space-40: 160px;

  /* ---------- Radius ---------- */
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   20px;
  --radius-xl:   24px;
  --radius-2xl:  32px;
  --radius-full: 999px;

  /* ---------- Shadows ---------- */
  --shadow-sm:    0 1px 4px rgba(45, 45, 45, 0.04);
  --shadow-md:    0 4px 16px rgba(45, 45, 45, 0.06);
  --shadow-lg:    0 8px 32px rgba(45, 45, 45, 0.08);
  --shadow-xl:    0 20px 40px rgba(45, 45, 45, 0.10);
  --shadow-coral: 0 8px 24px rgba(237, 104, 100, 0.25);
  --shadow-coral-lg: 0 20px 40px rgba(237, 104, 100, 0.15);
  --shadow-glass: 0 12px 40px rgba(45, 45, 45, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.7);

  /* ---------- Motion ---------- */
  --ease-out-expo:   cubic-bezier(0.19, 1, 0.22, 1);
  --ease-out-back:   cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-in-out-cubic: cubic-bezier(0.645, 0.045, 0.355, 1);
  --dur-micro: 200ms;
  --dur-hover: 350ms;
  --dur-section: 700ms;
  --dur-reveal: 1000ms;

  /* ---------- Layout ---------- */
  --container-max: 1280px;
  --container-pad: clamp(20px, 5vw, 80px);
}

/* ============================================================
   Typography — semantic roles
   ============================================================ */

body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Display — hero */
.type-display-xl {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(3rem, 6vw, 5.5rem);
  line-height: 1.05;
  letter-spacing: -0.03em;
}

/* Display L — section titles */
.type-display-l, h1 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(2.25rem, 4vw, 3.5rem);
  line-height: 1.1;
  letter-spacing: -0.02em;
}

/* Display M — subsections */
.type-display-m, h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(1.75rem, 3vw, 2.5rem);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

.type-heading-l, h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 24px;
  line-height: 1.3;
}

.type-heading-m, h4 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 20px;
  line-height: 1.4;
}

.type-body-l {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 18px;
  line-height: 1.6;
}

.type-body-m, p {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.6;
}

.type-body-s, small {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  line-height: 1.5;
}

.type-ui-button {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 16px;
  line-height: 1;
}

.type-label {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 13px;
  line-height: 1.4;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--fg-muted);
}

/* Script accent — usar EXTREMADAMENTE puntual */
.type-script {
  font-family: var(--font-script);
  font-weight: 400;
  font-size: 1.5em;
  line-height: 1;
  color: var(--coral-900);
}

/* ============================================================
   Base resets & helpers
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

.container {
  max-width: var(--container-max);
  margin-inline: auto;
  padding-inline: var(--container-pad);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}


/* ============================================================
   2. COMPONENTES BASE — components.css (botones, cards, etc.)
   ============================================================ */
/* ============================================================
   MobbiTrips — Component styles
   Depends on colors_and_type.css
   ============================================================ */

/* ---------- Buttons ---------- */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 48px;
  padding: 14px 28px;
  border-radius: var(--radius-full);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 16px;
  line-height: 1;
  border: none;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: all var(--dur-hover) var(--ease-out-back);
  will-change: transform, box-shadow;
}

.btn:active { transform: scale(0.98); }

/* Primary */
.btn-primary {
  background: var(--coral-900);
  color: var(--white);
  box-shadow: var(--shadow-coral);
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--coral-700) 0%, var(--coral-900) 100%);
  opacity: 0;
  transition: opacity var(--dur-hover) var(--ease-out-back);
}
.btn-primary > * { position: relative; z-index: 1; }
.btn-primary:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 24px rgba(237, 104, 100, 0.35);
}
.btn-primary:hover::before { opacity: 1; }

/* Secondary (outline) */
.btn-secondary {
  background: transparent;
  border: 1.5px solid var(--gray-900);
  color: var(--gray-900);
  transition: all 0.3s ease;
}
.btn-secondary:hover {
  background: var(--gray-900);
  color: var(--cream);
}

/* Glass */
.btn-glass {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: var(--gray-900);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
}
.btn-glass:hover {
  background: rgba(255, 255, 255, 0.75);
}

.btn-sm { height: 36px; padding: 8px 18px; font-size: 14px; }
.btn-lg { height: 56px; padding: 18px 34px; font-size: 17px; }

/* ---------- Cards ---------- */

.card-property {
  background: var(--white);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all 0.5s var(--ease-out-back);
  will-change: transform, box-shadow;
  cursor: pointer;
  position: relative;
}
.card-property::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.8s var(--ease-out-expo);
  pointer-events: none;
  z-index: 2;
}
.card-property:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-coral-lg);
}
.card-property:hover::after { transform: translateX(100%); }

.card-property__media {
  aspect-ratio: 4/3;
  width: 100%;
  background: var(--gradient-coral-soft);
  position: relative;
  overflow: hidden;
}
.card-property__media img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.8s var(--ease-out-expo);
}
.card-property:hover .card-property__media img { transform: scale(1.04); }

.card-property__body { padding: 24px; }
.card-property__title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  line-height: 1.3;
  color: var(--gray-900);
  margin: 0 0 4px;
}
.card-property__meta {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--gray-700);
  margin: 0 0 12px;
}
.card-property__price {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  color: var(--gray-900);
}
.card-property__price span {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  color: var(--gray-700);
}

/* Glass card */
.card-glass {
  background: rgba(250, 247, 242, 0.65);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-glass);
  padding: 24px;
}

/* Content / editorial card */
.card-content {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px;
  box-shadow: var(--shadow-sm);
}

/* ---------- Inputs ---------- */

.input-text {
  width: 100%;
  height: 48px;
  padding: 14px 18px;
  background: var(--white);
  border: 1px solid var(--gray-100);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--gray-900);
  transition: all 0.2s ease;
}
.input-text::placeholder { color: var(--gray-500); }
.input-text:focus {
  outline: 3px solid rgba(237, 104, 100, 0.15);
  border-color: var(--coral-900);
  border-width: 1.5px;
}

.input-search {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px 10px 20px;
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-glass);
}
.input-search input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  height: 40px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--gray-900);
}
.input-search input::placeholder { color: var(--gray-500); }

/* ---------- Tags / pills ---------- */

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--coral-100);
  color: var(--coral-950);
  border-radius: var(--radius-full);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
}
.tag-neutral {
  background: var(--gray-100);
  color: var(--gray-900);
}
.tag-outline {
  background: transparent;
  border: 1px solid var(--gray-200);
  color: var(--gray-900);
}

/* ---------- Navbar ---------- */

.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: transparent;
  transition: background 0.4s ease, backdrop-filter 0.4s ease, box-shadow 0.4s ease, transform 0.3s ease;
}
.navbar--scrolled {
  background: rgba(250, 247, 242, 0.8);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
}
.navbar--hidden { transform: translateY(-100%); }
.navbar__brand { display: flex; align-items: center; gap: 10px; }
.navbar__brand img { width: 36px; height: 36px; transition: transform 0.3s var(--ease-out-back); }
.navbar__brand:hover img { transform: scale(1.05); }
.navbar__wordmark {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  letter-spacing: -0.01em;
  color: var(--gray-900);
}
.navbar__links { display: flex; align-items: center; gap: 32px; }
.navbar__links a {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 15px;
  color: var(--gray-900);
  text-decoration: none;
  transition: color 0.2s ease;
}
.navbar__links a:hover { color: var(--coral-900); }


/* ============================================================
   3. WEBSITE LAYOUT — website.css (secciones generales)
   ============================================================ */
/* ============================================================
   MobbiTrips UI kit — website styles
   ============================================================ */

html, body { margin: 0; padding: 0; background: var(--cream); color: var(--gray-900); font-family: var(--font-body); scroll-behavior: smooth; }
.script-inline { font-family: var(--font-script); color: var(--coral-900); font-weight: 400; font-size: 1.1em; line-height: 1; letter-spacing: 0; }
.script-inline--lg { font-size: 1.3em; }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  min-height: 760px;
  padding: 180px 0 120px;
  overflow: hidden;
  isolation: isolate;
}
.hero__bg {
  position: absolute; inset: 0; z-index: -1;
  background: linear-gradient(180deg, #FAF7F2 0%, #FDE8E6 40%, #F9CFCC 80%, #F5B0AD 100%);
}
.hero__blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.65;
}
.hero__blob--1 { width: 520px; height: 520px; top: -120px; right: -100px; background: radial-gradient(circle, #F08884 0%, transparent 70%); }
.hero__blob--2 { width: 620px; height: 620px; bottom: -200px; left: -150px; background: radial-gradient(circle, #E8B547 0%, transparent 70%); opacity: 0.35; }
.hero__arc {
  position: absolute;
  right: 8%; top: 14%;
  width: 180px; height: 260px;
  border: 2px solid var(--coral-300);
  border-radius: 180px 180px 0 0 / 260px 260px 0 0;
  border-bottom: none;
  opacity: 0.45;
  filter: blur(1px);
}
.hero__content {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 var(--container-pad);
  position: relative;
  z-index: 1;
}
.hero__kicker {
  display: inline-block;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--coral-950);
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.6);
  padding: 8px 16px;
  border-radius: 999px;
  margin-bottom: 28px;
}
.hero__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(3rem, 6vw, 5.5rem);
  line-height: 1.04;
  letter-spacing: -0.03em;
  color: var(--gray-950);
  margin: 0 0 40px;
  max-width: 900px;
}
.hero__title-line2 {
  display: block;
  margin-top: 0.05em;
  margin-bottom: 0.35em;
  line-height: 1;
  font-size: 0.7em;
}
.hero__title-script {
  font-family: var(--font-script);
  font-weight: 400;
  color: var(--coral-900);
  letter-spacing: 0;
  line-height: 1;
  display: inline-block;
}
.hero__lede {
  font-family: var(--font-body);
  font-size: 19px;
  line-height: 1.55;
  color: var(--gray-900);
  max-width: 560px;
  margin: 0 0 40px;
}
.hero__search {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 10px 10px 10px 24px;
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 999px;
  box-shadow: 0 12px 40px rgba(45, 45, 45, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
  max-width: 780px;
}
.hero__search-field { flex: 1; display: flex; flex-direction: column; padding: 6px 10px; min-width: 0; }
.hero__search-label { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-700); margin-bottom: 2px; }
.hero__search-field input { border: none; background: transparent; outline: none; font-family: var(--font-body); font-size: 14px; color: var(--gray-900); width: 100%; padding: 0; }
.hero__search-field input::placeholder { color: var(--gray-500); }
.hero__search-div { width: 1px; height: 32px; background: var(--gray-200); }
.hero__search-btn { margin-left: 10px; }

/* ---------- Section base ---------- */
.section { padding: 128px 0; position: relative; }
.section--properties { background: var(--cream); }
.section--destinations { background: var(--white); }
.section__header { display: flex; justify-content: space-between; align-items: flex-end; gap: 40px; margin-bottom: 48px; }
.section__kicker { display: block; font-family: var(--font-body); font-weight: 500; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--coral-950); margin-bottom: 14px; }
.section__title { font-family: var(--font-display); font-weight: 600; font-size: clamp(2.25rem, 4vw, 3.5rem); line-height: 1.1; letter-spacing: -0.02em; color: var(--gray-950); margin: 0; max-width: 720px; }
.section__link { font-family: var(--font-body); font-weight: 500; font-size: 15px; color: var(--coral-900); text-decoration: none; white-space: nowrap; }
.section__link:hover { color: var(--coral-950); }

/* ---------- Filter chips ---------- */
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
.filter-chip {
  padding: 10px 18px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid var(--gray-200);
  color: var(--gray-900);
  font-family: var(--font-body); font-weight: 500; font-size: 14px;
  cursor: pointer;
  transition: all 0.3s var(--ease-out-back);
}
.filter-chip:hover { border-color: var(--gray-900); transform: translateY(-1px); }
.filter-chip--active { background: var(--gray-900); color: var(--cream); border-color: var(--gray-900); }

/* ---------- Property grid & card extras ---------- */
.grid-properties { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
@media (max-width: 960px) { .grid-properties { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .grid-properties { grid-template-columns: 1fr; } }

.prop-badge {
  position: absolute; top: 14px; left: 14px; z-index: 2;
  padding: 6px 12px; border-radius: 999px;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
  font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--gray-900);
}
.prop-heart {
  position: absolute; top: 14px; right: 14px; z-index: 2;
  width: 36px; height: 36px; border-radius: 999px;
  background: rgba(255,255,255,0.55); backdrop-filter: blur(12px);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--coral-900);
  transition: transform 0.3s var(--ease-out-back), background 0.3s ease;
}
.prop-heart:hover { transform: scale(1.1); background: rgba(255,255,255,0.85); }
.prop-heart--on { color: var(--coral-900); }
.prop-gradient-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.1) 100%);
  pointer-events: none;
}

/* ---------- Destination cards ---------- */
.grid-destinations { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1.4fr; gap: 20px; }
@media (max-width: 960px) { .grid-destinations { grid-template-columns: 1fr 1fr; } }
.dest-card {
  position: relative;
  aspect-ratio: 3/4;
  min-height: 380px;
  border-radius: 24px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.5s var(--ease-out-back), box-shadow 0.5s var(--ease-out-back);
}
.dest-card:hover { transform: translateY(-6px); box-shadow: 0 24px 48px rgba(45,45,45,0.14); }
.dest-card__overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(31,31,31,0.5) 100%);
}
.dest-card__body {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 28px;
  color: var(--white);
}
.dest-card__script { font-family: var(--font-script); font-size: 28px; color: var(--cream); display: block; line-height: 1; margin-bottom: 6px; opacity: 0.9; }
.dest-card__name { font-family: var(--font-display); font-weight: 600; font-size: 32px; margin: 0; letter-spacing: -0.02em; line-height: 1.1; }
.dest-card__meta { font-family: var(--font-body); font-size: 14px; opacity: 0.85; margin-top: 6px; display: flex; gap: 8px; }
.dest-card__meta .dot { opacity: 0.6; }

/* ---------- Manifesto ---------- */
.section--manifesto { background: var(--charcoal); color: var(--cream); padding: 160px 0; overflow: hidden; }
.manifesto__bg { position: absolute; inset: 0; overflow: hidden; }
.manifesto__blob {
  position: absolute;
  width: 800px; height: 800px;
  top: -200px; right: -300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(237,104,100,0.35) 0%, transparent 70%);
  filter: blur(40px);
}
.manifesto__content { position: relative; z-index: 1; }
.manifesto__content .section__kicker { color: var(--coral-500); }
.manifesto__title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(2.25rem, 5vw, 4rem);
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin: 0 0 80px;
  max-width: 1000px;
}
.manifesto__title .script-inline { color: var(--coral-500); }
.manifesto__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
@media (max-width: 768px) { .manifesto__grid { grid-template-columns: 1fr; } }
.manifesto__pillar {
  padding: 32px;
  background: rgba(250,247,242,0.04);
  border: 1px solid rgba(250,247,242,0.08);
  border-radius: 24px;
  backdrop-filter: blur(12px);
}
.manifesto__icon { width: 28px; height: 28px; color: var(--coral-500); margin-bottom: 20px; stroke-width: 1.75; display: block; }
.manifesto__pillar h4 { font-family: var(--font-display); font-weight: 600; font-size: 22px; margin: 0 0 10px; letter-spacing: -0.01em; }
.manifesto__pillar p { font-family: var(--font-body); font-size: 15px; line-height: 1.6; color: rgba(250,247,242,0.72); margin: 0; }

/* ---------- CTA band ---------- */
.cta-band {
  background: var(--gradient-sunset);
  padding: 100px 0;
  position: relative;
  overflow: hidden;
}
.cta-band::before, .cta-band::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
}
.cta-band::before { width: 500px; height: 500px; top: -150px; right: -100px; background: radial-gradient(circle, rgba(237,104,100,0.4), transparent 70%); }
.cta-band::after  { width: 400px; height: 400px; bottom: -150px; left: -100px; background: radial-gradient(circle, rgba(232,181,71,0.3), transparent 70%); }
.cta-band__inner { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; gap: 48px; flex-wrap: wrap; }
.cta-band__title { font-family: var(--font-display); font-weight: 600; font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.1; letter-spacing: -0.02em; color: var(--gray-950); margin: 0 0 10px; max-width: 600px; }
.cta-band__lede { font-family: var(--font-body); font-size: 17px; color: var(--gray-900); margin: 0; max-width: 560px; }
.cta-band__actions { display: flex; gap: 12px; flex-wrap: wrap; }

/* ---------- Footer ---------- */
.footer { background: var(--charcoal); color: var(--cream); padding: 80px 0 32px; }
.footer > * { max-width: var(--container-max); margin-inline: auto; padding-inline: var(--container-pad); }
.footer__top { display: grid; grid-template-columns: 1fr 1.6fr; gap: 60px; margin-bottom: 60px; }
@media (max-width: 768px) { .footer__top { grid-template-columns: 1fr; } }
.footer__brand { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.footer__brand img { width: 36px; height: 36px; }
.footer__brand span { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: -0.01em; }
.footer__tag { font-family: var(--font-display); font-weight: 500; font-size: 20px; margin: 0; line-height: 1.3; }
.footer__script { font-family: var(--font-script); font-size: 32px; color: var(--coral-500); margin: 4px 0 0; line-height: 1; }
.footer__cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
.footer__cols > div { display: flex; flex-direction: column; gap: 10px; }
.footer__label { font-family: var(--font-body); font-weight: 600; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(250,247,242,0.5); margin-bottom: 6px; }
.footer__cols a { font-family: var(--font-body); font-size: 15px; color: var(--cream); text-decoration: none; opacity: 0.85; cursor: pointer; }
.footer__cols a:hover { opacity: 1; color: var(--coral-500); }
.footer__bottom { display: flex; justify-content: space-between; padding-top: 28px; border-top: 1px solid rgba(250,247,242,0.08); font-family: var(--font-body); font-size: 13px; color: rgba(250,247,242,0.6); }

/* ---------- Amenity chip ---------- */
.amenity-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: var(--white);
  border-radius: 999px;
  font-family: var(--font-body); font-size: 14px; color: var(--gray-900);
  box-shadow: var(--shadow-sm);
}
.amenity-chip i { width: 16px; height: 16px; color: var(--coral-900); stroke-width: 1.75; }

/* ============================================================
   Typography — semantic roles
   ============================================================ */

body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* Display — hero */
.type-display-xl {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(3rem, 6vw, 5.5rem);
  line-height: 1.05;
  letter-spacing: -0.03em;
}

/* Display L — section titles */
.type-display-l, h1 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(2.25rem, 4vw, 3.5rem);
  line-height: 1.1;
  letter-spacing: -0.02em;
}

/* Display M — subsections */
.type-display-m, h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(1.75rem, 3vw, 2.5rem);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

.type-heading-l, h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 24px;
  line-height: 1.3;
}

.type-heading-m, h4 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 20px;
  line-height: 1.4;
}

.type-body-l {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 18px;
  line-height: 1.6;
}

.type-body-m, p {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.6;
}

.type-body-s, small {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  line-height: 1.5;
}

.type-ui-button {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 16px;
  line-height: 1;
}

.type-label {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 13px;
  line-height: 1.4;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--fg-muted);
}

/* Script accent — usar EXTREMADAMENTE puntual */
.type-script {
  font-family: var(--font-script);
  font-weight: 400;
  font-size: 1.5em;
  line-height: 1;
  color: var(--coral-900);
}

/* ============================================================
   Base resets & helpers
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

.container {
  max-width: var(--container-max);
  margin-inline: auto;
  padding-inline: var(--container-pad);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================================
   MobbiTrips — Component styles
   Depends on colors_and_type.css
   ============================================================ */

/* ---------- Buttons ---------- */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 48px;
  padding: 14px 28px;
  border-radius: var(--radius-full);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 16px;
  line-height: 1;
  border: none;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: all var(--dur-hover) var(--ease-out-back);
  will-change: transform, box-shadow;
}

.btn:active { transform: scale(0.98); }

/* Primary */
.btn-primary {
  background: var(--coral-900);
  color: var(--white);
  box-shadow: var(--shadow-coral);
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--coral-700) 0%, var(--coral-900) 100%);
  opacity: 0;
  transition: opacity var(--dur-hover) var(--ease-out-back);
}
.btn-primary > * { position: relative; z-index: 1; }
.btn-primary:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 24px rgba(237, 104, 100, 0.35);
}
.btn-primary:hover::before { opacity: 1; }

/* Secondary (outline) */
.btn-secondary {
  background: transparent;
  border: 1.5px solid var(--gray-900);
  color: var(--gray-900);
  transition: all 0.3s ease;
}
.btn-secondary:hover {
  background: var(--gray-900);
  color: var(--cream);
}

/* Glass */
.btn-glass {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: var(--gray-900);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
}
.btn-glass:hover {
  background: rgba(255, 255, 255, 0.75);
}

.btn-sm { height: 36px; padding: 8px 18px; font-size: 14px; }
.btn-lg { height: 56px; padding: 18px 34px; font-size: 17px; }

/* ---------- Cards ---------- */

.card-property {
  background: var(--white);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all 0.5s var(--ease-out-back);
  will-change: transform, box-shadow;
  cursor: pointer;
  position: relative;
}
.card-property::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.8s var(--ease-out-expo);
  pointer-events: none;
  z-index: 2;
}
.card-property:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-coral-lg);
}
.card-property:hover::after { transform: translateX(100%); }

.card-property__media {
  aspect-ratio: 4/3;
  width: 100%;
  background: var(--gradient-coral-soft);
  position: relative;
  overflow: hidden;
}
.card-property__media img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.8s var(--ease-out-expo);
}
.card-property:hover .card-property__media img { transform: scale(1.04); }

.card-property__body { padding: 24px; }
.card-property__title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  line-height: 1.3;
  color: var(--gray-900);
  margin: 0 0 4px;
}
.card-property__meta {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--gray-700);
  margin: 0 0 12px;
}
.card-property__price {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  color: var(--gray-900);
}
.card-property__price span {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 14px;
  color: var(--gray-700);
}

/* Glass card */
.card-glass {
  background: rgba(250, 247, 242, 0.65);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-glass);
  padding: 24px;
}

/* Content / editorial card */
.card-content {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px;
  box-shadow: var(--shadow-sm);
}

/* ---------- Inputs ---------- */

.input-text {
  width: 100%;
  height: 48px;
  padding: 14px 18px;
  background: var(--white);
  border: 1px solid var(--gray-100);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--gray-900);
  transition: all 0.2s ease;
}
.input-text::placeholder { color: var(--gray-500); }
.input-text:focus {
  outline: 3px solid rgba(237, 104, 100, 0.15);
  border-color: var(--coral-900);
  border-width: 1.5px;
}

.input-search {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px 10px 20px;
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-glass);
}
.input-search input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  height: 40px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--gray-900);
}
.input-search input::placeholder { color: var(--gray-500); }

/* ---------- Tags / pills ---------- */

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--coral-100);
  color: var(--coral-950);
  border-radius: var(--radius-full);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
}
.tag-neutral {
  background: var(--gray-100);
  color: var(--gray-900);
}
.tag-outline {
  background: transparent;
  border: 1px solid var(--gray-200);
  color: var(--gray-900);
}

/* ---------- Navbar ---------- */

.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: transparent;
  transition: background 0.4s ease, backdrop-filter 0.4s ease, box-shadow 0.4s ease, transform 0.3s ease;
}
.navbar--scrolled {
  background: rgba(250, 247, 242, 0.8);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
}
.navbar--hidden { transform: translateY(-100%); }
.navbar__brand { display: flex; align-items: center; gap: 10px; }
.navbar__brand img { width: 36px; height: 36px; transition: transform 0.3s var(--ease-out-back); }
.navbar__brand:hover img { transform: scale(1.05); }
.navbar__wordmark {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  letter-spacing: -0.01em;
  color: var(--gray-900);
}
.navbar__links { display: flex; align-items: center; gap: 32px; }
.navbar__links a {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 15px;
  color: var(--gray-900);
  text-decoration: none;
  transition: color 0.2s ease;
}
.navbar__links a:hover { color: var(--coral-900); }

/* ============================================================
   MobbiTrips — Navbar + Hero
   ============================================================ */

html { scroll-behavior: smooth; }
body { margin: 0; background: var(--cream); overflow-x: hidden; }

/* ============================================================
   NAVBAR — overrides + extensions on the design system navbar
   ============================================================ */

.mt-navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  padding: 20px 48px;
  background: transparent;
  transition: background 180ms var(--ease-in-out-cubic),
              backdrop-filter 180ms var(--ease-in-out-cubic),
              -webkit-backdrop-filter 180ms var(--ease-in-out-cubic),
              box-shadow 180ms var(--ease-in-out-cubic),
              border-color 180ms var(--ease-in-out-cubic),
              transform 300ms ease-out;
  border-bottom: 1px solid transparent;
  will-change: transform, background;
}
.mt-navbar--scrolled {
  background: rgba(250, 247, 242, 0.85);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom-color: rgba(255, 255, 255, 0.5);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
}
/* smart-hide disabled — navbar always visible */
/* .mt-navbar--hidden { transform: translateY(-100%); } */

.mt-navbar__inner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  gap: 24px;
}

.mt-navbar__brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  justify-self: start;
  transition: transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mt-navbar__brand:hover { transform: scale(1.05); }
.mt-navbar__brand img {
  width: 34px; height: 34px;
  object-fit: contain;
}
.mt-navbar__wordmark {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.02em;
  color: var(--gray-900);
}

.mt-navbar__links {
  display: flex;
  align-items: center;
  gap: 36px;
  justify-self: center;
}
.mt-navbar__link {
  position: relative;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 15px;
  color: var(--gray-900);
  text-decoration: none;
  padding: 6px 2px;
  transition: color 200ms ease;
}
.mt-navbar__link::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  bottom: -2px;
  height: 1.5px;
  background: var(--coral-900);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 250ms ease-out;
}
.mt-navbar__link:hover { color: var(--coral-900); }
.mt-navbar__link:hover::after { transform: scaleX(1); }

.mt-navbar__actions {
  display: flex;
  align-items: center;
  gap: 16px;
  justify-self: end;
}
.mt-navbar__signin {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 15px;
  color: var(--gray-900);
  text-decoration: none;
  transition: color 200ms ease;
}
.mt-navbar__signin:hover { color: var(--coral-900); }

.mt-navbar__cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 42px;
  padding: 0 22px;
  border: none;
  cursor: pointer;
  border-radius: 999px;
  background: var(--coral-900);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  line-height: 1;
  box-shadow: 0 4px 16px rgba(237, 104, 100, 0.25);
  transition: all 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}
.mt-navbar__cta::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--coral-700) 0%, var(--coral-950) 100%);
  opacity: 0;
  transition: opacity 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.mt-navbar__cta > span { position: relative; z-index: 1; }
.mt-navbar__cta:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 24px rgba(237, 104, 100, 0.35);
}
.mt-navbar__cta:hover::before { opacity: 1; }
.mt-navbar__cta:active { transform: scale(0.98); }

.mt-navbar__burger {
  display: none;
  width: 44px; height: 44px;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 5px;
}
.mt-navbar__burger span {
  display: block;
  width: 22px;
  height: 2px;
  border-radius: 2px;
  background: var(--gray-900);
  transition: transform 300ms var(--ease-out-back), opacity 200ms;
}
.mt-navbar__burger[aria-expanded="true"] span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.mt-navbar__burger[aria-expanded="true"] span:nth-child(2) {
  opacity: 0;
}
.mt-navbar__burger[aria-expanded="true"] span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

/* Mobile menu panel */
.mt-mobile-menu {
  position: fixed;
  top: 74px;
  left: 16px; right: 16px;
  z-index: 99;
  padding: 24px;
  background: rgba(250, 247, 242, 0.78);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 24px;
  box-shadow: 0 12px 40px rgba(45, 45, 45, 0.12);
  transform: translateY(-16px);
  opacity: 0;
  pointer-events: none;
  transition: transform 400ms var(--ease-out-back), opacity 300ms ease-out;
}
.mt-mobile-menu--open {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.mt-mobile-menu__link {
  display: block;
  padding: 14px 8px;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 20px;
  color: var(--gray-900);
  text-decoration: none;
  border-bottom: 1px solid rgba(45, 45, 45, 0.06);
}
.mt-mobile-menu__link:last-of-type { border-bottom: none; }
.mt-mobile-menu__cta {
  display: block;
  margin-top: 16px;
  text-align: center;
  padding: 14px 22px;
  background: var(--coral-900);
  color: white;
  border-radius: 999px;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 16px;
  text-decoration: none;
  box-shadow: 0 4px 16px rgba(237, 104, 100, 0.25);
}

/* ============================================================
   HERO
   ============================================================ */

.hero {
  position: relative;
  min-height: max(100vh, 720px);
  padding: 72px var(--container-pad) 48px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: stretch;
  overflow: hidden;
  isolation: isolate;
  background: var(--cream);
}

/* Layer 2 — ambient gradient */
.hero__gradient {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 90% 70% at top right, #FDE8E6 0%, #FAF7F2 60%);
  opacity: 0.8;
  z-index: 0;
  pointer-events: none;
}

/* Layer 3 — abstract shapes */
.hero__shapes {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  will-change: transform;
}

.hero__shape {
  position: absolute;
  pointer-events: none;
  will-change: transform;
}

/* Shape 1 — large arc top-left */
.hero__shape--arc1 {
  top: 15%;
  left: -5%;
  width: 600px;
  height: 800px;
  animation: floatY1 12s ease-in-out infinite;
}
.hero__shape--arc1 svg {
  width: 100%; height: 100%;
  filter: blur(40px);
  opacity: 1;
}

/* Shape 2 — large circle */
.hero__shape--circle1 {
  top: 30%;
  right: 10%;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: var(--gradient-coral-soft);
  filter: blur(60px);
  opacity: 0.55;
  animation: floatY2 18s ease-in-out infinite;
}

/* Shape 3 — mustard medium arc */
.hero__shape--arc2 {
  bottom: 20%;
  right: 20%;
  width: 350px;
  height: 450px;
  animation: spinSlow 60s linear infinite;
}
.hero__shape--arc2 svg {
  width: 100%; height: 100%;
  filter: blur(50px);
}

/* Shape 4 — glass circle small */
.hero__shape--glass {
  top: 50%;
  left: 15%;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 8px 32px rgba(45, 45, 45, 0.05);
  animation: floatRotate 15s ease-in-out infinite;
}

@keyframes floatY1 {
  0%, 100% { transform: translateY(-20px); }
  50% { transform: translateY(20px); }
}
@keyframes floatY2 {
  0%, 100% { transform: translateY(15px); }
  50% { transform: translateY(-15px); }
}
@keyframes spinSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes floatRotate {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(180deg); }
}

/* Hero content wrapper — handles parallax/blur on scroll */
.hero__content {
  position: relative;
  z-index: 2;
  max-width: 1280px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  will-change: transform, filter, opacity;
  padding-top: 16px;
}

/* Eyebrow pill */
.hero__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: rgba(237, 104, 100, 0.08);
  border-radius: 999px;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--coral-900);
  opacity: 0;
  transform: translateY(20px);
  animation: eyebrowIn 640ms cubic-bezier(0.19, 1, 0.22, 1) 0ms forwards;
}
.hero__eyebrow-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--coral-900);
  box-shadow: 0 0 0 3px rgba(237, 104, 100, 0.18);
  animation: pulseDot 2.4s ease-in-out infinite;
}
@keyframes pulseDot {
  0%, 100% { box-shadow: 0 0 0 3px rgba(237, 104, 100, 0.18); }
  50% { box-shadow: 0 0 0 6px rgba(237, 104, 100, 0.06); }
}
@keyframes eyebrowIn {
  to { opacity: 1; transform: translateY(0); }
}

/* Headline */
.hero__headline {
  margin: 20px 0 0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(3rem, 6vw, 5.5rem);
  line-height: 1.05;
  letter-spacing: -0.03em;
  color: var(--gray-900);
  max-width: 22ch;
  text-align: left;
}

.hl-line {
  display: block;
  overflow: hidden;
  padding: 0.04em 0;
}
.hl-words {
  display: inline;
}
.hl-word {
  display: inline-block;
  transform: translateY(110%);
  opacity: 0;
  animation: wordIn 720ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
}
.hl-word { margin: 0; }
.hl-space { display: inline-block; width: 0; }

@keyframes wordIn {
  to { transform: translateY(0); opacity: 1; }
}

.hl-script {
  display: inline-block;
  font-family: var(--font-script);
  font-weight: 600;
  font-size: 1.22em;
  color: var(--coral-900);
  transform: rotate(-3deg) scale(0.8);
  opacity: 0;
  transform-origin: left center;
  line-height: 0.9;
  margin-left: 0;
  padding: 0 16.104px;
  text-align: left;
  animation: scriptIn 950ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes scriptIn {
  to { transform: rotate(-3deg) scale(1); opacity: 1; }
}

/* Little underline squiggle under "en casa" */
.hl-script svg {
  position: absolute;
  left: 0; right: 0; bottom: -0.08em;
  width: 100%;
  height: 0.22em;
  stroke: var(--coral-900);
  fill: none;
  stroke-linecap: round;
  opacity: 0.7;
}
.hl-script-wrap {
  position: relative;
  display: inline-block;
}

/* Subheadline */
.hero__lede {
  margin: 28px 0 0;
  max-width: 560px;
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.55;
  color: var(--gray-700);
  opacity: 0;
  transform: translateY(15px);
  animation: ledeIn 560ms ease-out 1100ms forwards;
}
@keyframes ledeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   SEARCH PILL — liquid glass
   ============================================================ */
.hero__search {
  position: relative;
  margin-top: 32px;
  width: 100%;
  max-width: 820px;
  height: 64px;
  display: flex;
  align-items: stretch;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 999px;
  box-shadow: 0 12px 40px rgba(45, 45, 45, 0.08),
              inset 0 1px 0 rgba(255, 255, 255, 0.7);
  padding: 0;
  overflow: visible;
  opacity: 0;
  transform: translateY(40px) scale(0.95);
  filter: blur(10px);
  animation:
    searchIn 800ms cubic-bezier(0.34, 1.56, 0.64, 1) 1400ms forwards,
    searchBreathe 4s ease-in-out infinite 2200ms;
}
@keyframes searchIn {
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes searchBreathe {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 12px 40px rgba(45, 45, 45, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
  }
  50% {
    transform: scale(1.005);
    box-shadow: 0 14px 46px rgba(45, 45, 45, 0.09),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
  }
}

.hero__search-section {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  padding: 12px 10px;
  cursor: pointer;
  background: transparent;
  border: none;
  text-align: left;
  font: inherit;
  color: inherit;
  transition: background 250ms ease;
  border-radius: 999px;
  margin: 6px 3px;
  min-width: 0;
  overflow: hidden;
}
.hero__search-section:first-child { margin-left: 6px; }
.hero__search-section:hover,
.hero__search-section:focus-visible {
  background: rgba(255, 255, 255, 0.5);
  outline: none;
}
.hero__search-section:focus-visible {
  box-shadow: 0 0 0 2px rgba(237, 104, 100, 0.3);
}
.hero__search-label {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-500);
  line-height: 1.2;
}
.hero__search-value {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 14.5px;
  color: var(--gray-900);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hero__search-value--muted { color: var(--gray-500); font-weight: 400; }

.hero__search-divider {
  width: 1px;
  height: 32px;
  background: rgba(45, 45, 45, 0.1);
  flex-shrink: 0;
  align-self: center;
}

.hero__search-btn {
  flex-shrink: 0;
  align-self: center;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 52px;
  padding: 0 20px;
  margin: 0 6px 0 8px;
  background: var(--coral-900);
  color: white;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(237, 104, 100, 0.3);
  transition: all 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}
.hero__search-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--coral-700) 0%, var(--coral-950) 100%);
  opacity: 0;
  transition: opacity 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.hero__search-btn > * { position: relative; z-index: 1; }
.hero__search-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 26px rgba(237, 104, 100, 0.42);
}
.hero__search-btn:hover::before { opacity: 1; }
.hero__search-btn:active { transform: scale(0.98); }

/* CTAs row */
.hero__ctas {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 24px;
}
.hero__cta {
  opacity: 0;
  transform: translateY(10px);
  animation: ctaIn 480ms ease-out forwards;
}
.hero__cta--1 { animation-delay: 1900ms; }
.hero__cta--2 { animation-delay: 2000ms; }
@keyframes ctaIn {
  to { opacity: 1; transform: translateY(0); }
}

.hero__cta-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  height: 52px;
  background: var(--coral-900);
  color: white;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(237, 104, 100, 0.25);
  transition: all 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  text-decoration: none;
  position: relative;
  overflow: hidden;
}
.hero__cta-primary::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--coral-700) 0%, var(--coral-950) 100%);
  opacity: 0;
  transition: opacity 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
.hero__cta-primary > * { position: relative; z-index: 1; }
.hero__cta-primary:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 24px rgba(237, 104, 100, 0.35);
}
.hero__cta-primary:hover::before { opacity: 1; }

.hero__cta-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 26px;
  height: 52px;
  background: transparent;
  color: var(--gray-900);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  border: 1.5px solid var(--gray-900);
  border-radius: 999px;
  cursor: pointer;
  transition: all 350ms var(--ease-in-out-cubic);
  text-decoration: none;
}
.hero__cta-secondary svg {
  transition: transform 350ms var(--ease-out-back);
}
.hero__cta-secondary:hover {
  background: var(--gray-900);
  color: var(--cream);
}
.hero__cta-secondary:hover svg {
  transform: translateX(4px);
}

/* Scroll indicator */
.hero__scroll {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 2;
  opacity: 0;
  animation: scrollFadeIn 640ms ease-out 2400ms forwards;
  pointer-events: none;
}
@keyframes scrollFadeIn { to { opacity: 1; } }

.hero__scroll-label {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-500);
}
.hero__scroll-ind {
  width: 24px;
  height: 38px;
  border: 1.5px solid var(--gray-500);
  border-radius: 999px;
  display: flex;
  justify-content: center;
  padding-top: 6px;
  animation: bounceY 2s ease-in-out infinite;
}
.hero__scroll-ind::after {
  content: '';
  width: 3px; height: 7px;
  border-radius: 999px;
  background: var(--coral-900);
  animation: mouseDot 2s ease-in-out infinite;
}
@keyframes bounceY {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
@keyframes mouseDot {
  0%, 100% { transform: translateY(0); opacity: 1; }
  50% { transform: translateY(8px); opacity: 0.2; }
}

/* ============================================================
   Dummy content so scrolling has purpose
   ============================================================ */
.scroll-section {
  padding: 128px var(--container-pad);
  max-width: 1280px;
  margin: 0 auto;
}
.scroll-section h2 {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--gray-900);
  margin: 0 0 16px;
}
.scroll-section p {
  max-width: 640px;
  color: var(--gray-700);
  font-size: 18px;
  line-height: 1.6;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */

@media (max-width: 1024px) {
  .hero__shape--arc1 { width: 420px; height: 560px; }
  .hero__shape--circle1 { width: 280px; height: 280px; }
  .hero__shape--arc2 { width: 240px; height: 320px; }
}

@media (max-width: 768px) {
  .mt-navbar { padding: 16px 20px; }
  .mt-navbar__links,
  .mt-navbar__actions .mt-navbar__signin { display: none; }
  .mt-navbar__burger { display: inline-flex; }
  .mt-navbar__inner { grid-template-columns: auto 1fr auto; }
  .mt-navbar__actions { gap: 10px; }

  .hero { padding: 100px 20px 80px; min-height: 100svh; }

  .hero__shape--arc1,
  .hero__shape--arc2 { display: none; }
  .hero__shape--circle1 { width: 220px; height: 220px; top: 12%; right: -10%; }
  .hero__shape--glass { width: 120px; height: 120px; }

  .hero__headline {
    font-size: clamp(2.4rem, 10vw, 3.4rem);
    max-width: 100%;
  }
  .hero__lede { font-size: 16px; margin-top: 20px; }

  .hero__search {
    height: auto;
    flex-direction: column;
    align-items: stretch;
    border-radius: 20px;
    padding: 6px;
    margin-top: 32px;
    animation:
      searchIn 900ms cubic-bezier(0.34, 1.56, 0.64, 1) 1600ms forwards,
      searchBreathe 4s ease-in-out infinite 2600ms;
  }
  .hero__search-section {
    padding: 12px 18px;
    margin: 2px 0;
    border-radius: 14px;
  }
  .hero__search-divider {
    width: auto; height: 1px;
    margin: 0 18px;
  }
  .hero__search-btn {
    width: calc(100% - 12px);
    margin: 6px;
    justify-content: center;
  }

  .hero__ctas { flex-direction: column; align-items: stretch; gap: 12px; }
  .hero__cta-primary,
  .hero__cta-secondary { width: 100%; justify-content: center; }

  .hero__scroll { bottom: 24px; }
  .hero__scroll-label { font-size: 11px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .hero__shape,
  .hero__search,
  .hero__eyebrow-dot { animation: none !important; }
  .hl-word, .hl-script { animation-duration: 400ms !important; animation-delay: 0ms !important; }
}

/* Focus visible coral ring */
:focus-visible {
  outline: 3px solid rgba(237, 104, 100, 0.35);
  outline-offset: 2px;
}

<div id="root"></div>

<!-- React + Babel desde CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ============================================================
     NAVBAR — editar aquí
     ============================================================ -->
<script type="text/babel">
// ============================================================
// MobbiTrips — Navbar
// ============================================================
const { useState: useStateN, useEffect: useEffectN, useRef: useRefN } = React;

window.Navbar = function Navbar() {
  const [scrolled, setScrolled] = useStateN(false);
  const [menuOpen, setMenuOpen] = useStateN(false);
  const lastYRef = useRefN(0);

  useEffectN(() => {
    const onScroll = () => {
      const y = window.scrollY;
      setScrolled(y > 40);
      lastYRef.current = y;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // Close mobile menu on resize to desktop
  useEffectN(() => {
    const onResize = () => { if (window.innerWidth > 768) setMenuOpen(false); };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const classes = ['mt-navbar'];
  if (scrolled) classes.push('mt-navbar--scrolled');

  const links = ['Propiedades', 'Destinos', 'Experiencias', 'Anfitriones'];

  return (
    <>

<script type="text/babel">
// ============================================================
// MobbiTrips — Hero with word-by-word headline animation,
// ambient blobs parallax, glass search pill, scroll-driven blur.
// ============================================================
const { useState: useStateH, useEffect: useEffectH, useRef: useRefH } = React;

function HeadlineWord({ children, delay }) {
  return (
    <>
      <span className="hl-word" style={{ animationDelay: `${delay}ms` }}>{children}</span>
      {' '}
    </>
  );
}

// Splits a line into animated words. Stagger of 80ms per word.
function HeadlineLine({ words, startDelay, stagger = 80 }) {
  return (
    <span className="hl-line">
      <span className="hl-words">
        {words.map((w, i) => (
          <HeadlineWord key={i} delay={startDelay + i * stagger}>
            {w}
          </HeadlineWord>
        ))}
      </span>
    </span>
  );
}

window.Hero = function Hero() {
  const contentRef = useRefH(null);
  const shapesRef = useRefH(null);

  // scroll-driven: parallax on shapes (30%), blur + fade on content
  useEffectH(() => {
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const y = window.scrollY;
        const vh = window.innerHeight;
        const progress = Math.min(1, Math.max(0, y / vh)); // 0 → 1 over 1 viewport
        const isMobile = window.innerWidth < 768;
        const shapesShift = y * (isMobile ? 0.15 : 0.3); // reduced on mobile
        if (shapesRef.current) {
          shapesRef.current.style.transform = `translate3d(0, ${-shapesShift * 0.5}px, 0)`;
        }
        if (contentRef.current) {
          const blur = progress * 10; // 0 → 10px
          const opacity = 1 - progress * 0.7; // 1 → 0.3
          contentRef.current.style.filter = `blur(${blur}px)`;
          contentRef.current.style.opacity = opacity;
        }
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => {
      window.removeEventListener('scroll', onScroll);
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);

  // Word timing — baseline 200ms global delay
  const base = 150;
  const line1 = ['Descansa,', 'vive', 'y', 'sueña', 'como', 'si', 'estuvieras'];
  const stagger = 55;
  const line1Start = base;
  // "en casa" script starts after last word of line 1 + 300ms
  const scriptDelay = line1Start + line1.length * stagger + 300;

  return (
    <section className="hero" id="hero" data-screen-label="Hero">
      <div className="hero__gradient" aria-hidden="true" />

      <div className="hero__shapes" ref={shapesRef} aria-hidden="true">
        {/* Shape 1 — large arc top-left */}
        <div className="hero__shape hero__shape--arc1">
          <svg viewBox="0 0 600 800" preserveAspectRatio="none">
            <path d="M 100 780 Q 100 200 380 200 Q 560 200 560 420 Q 560 780 560 780"
              fill="none" stroke="#F9CFCC" strokeWidth="180" strokeLinecap="round" opacity="0.85" />
          </svg>
        </div>

        {/* Shape 2 — large circle */}
        <div className="hero__shape hero__shape--circle1" />

        {/* Shape 3 — mustard medium arc */}
        <div className="hero__shape hero__shape--arc2">
          <svg viewBox="0 0 350 450" preserveAspectRatio="none">
            <path d="M 60 440 Q 60 80 190 80 Q 310 80 310 240 Q 310 440 310 440"
              fill="none" stroke="#E8B547" strokeWidth="120" strokeLinecap="round" opacity="0.15" />
          </svg>
        </div>

        {/* Shape 4 — glass circle */}
        <div className="hero__shape hero__shape--glass" />
      </div>

      <div className="hero__content" ref={contentRef}>
        <span className="hero__eyebrow">
          <span className="hero__eyebrow-dot" aria-hidden="true"></span>
          Casa en todas partes · Hospedaje humano
        </span>

        <h1 className="hero__headline">
          <HeadlineLine words={line1} startDelay={line1Start} stagger={stagger} />
          <span className="hl-line">
            <span className="hl-script-wrap">
              <span className="hl-script" style={{ animationDelay: `${scriptDelay}ms` }}>
                en casa
                <svg viewBox="0 0 200 10" preserveAspectRatio="none" aria-hidden="true">
                  <path d="M 4 6 Q 50 2 100 5 T 196 4" strokeWidth="2.2" />
                </svg>
              </span>
            </span>
          </span>
        </h1>

        <p className="hero__lede">
          Propiedades únicas alrededor del mundo. Curadas para sentirse como hogar, no como hotel.
        </p>

        <form className="hero__search" onSubmit={(e) => e.preventDefault()} aria-label="Buscar hospedajes">
          <button type="button" className="hero__search-section">
            <span className="hero__search-label">¿A dónde?</span>
            <span className="hero__search-value hero__search-value--muted">Xalapa, México</span>
          </button>
          <div className="hero__search-divider" aria-hidden="true" />

          <button type="button" className="hero__search-section">
            <span className="hero__search-label">Llegada</span>
            <span className="hero__search-value hero__search-value--muted">Añade fecha</span>
          </button>
          <div className="hero__search-divider" aria-hidden="true" />

          <button type="button" className="hero__search-section">
            <span className="hero__search-label">Salida</span>
            <span className="hero__search-value hero__search-value--muted">Añade fecha</span>
          </button>
          <div className="hero__search-divider" aria-hidden="true" />

          <button type="button" className="hero__search-section">
            <span className="hero__search-label">Huéspedes</span>
            <span className="hero__search-value hero__search-value--muted">Añade huéspedes</span>
          </button>

          <button type="submit" className="hero__search-btn" aria-label="Buscar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span>Buscar</span>
          </button>
        </form>

        <div className="hero__ctas">
          <a href="#" className="hero__cta hero__cta--1 hero__cta-primary">
            <span>Ver propiedades</span>
          </a>
          <a href="#" className="hero__cta hero__cta--2 hero__cta-secondary">
            <span>Conoce más</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </a>
        </div>
      </div>

      <a href="#siguiente" className="hero__scroll" aria-label="Descubre más">
        <span className="hero__scroll-label">Descubre más</span>
        <span className="hero__scroll-ind" aria-hidden="true"></span>
      </a>
    </section>
  );
};

</script>
