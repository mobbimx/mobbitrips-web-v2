<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Coral scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border-radius: 14px; overflow: hidden; background: var(--white); box-shadow: var(--shadow-sm); }
  .sw .chip { aspect-ratio: 1.3/1; }
  .sw .meta { padding: 10px 12px; }
  .sw .name { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--gray-900); }
  .sw .hex  { font-family: var(--font-body); font-size: 11px; color: var(--gray-700); margin-top: 2px; letter-spacing: 0.02em; }
  .label { font-family: var(--font-display); font-weight: 500; font-size: 14px; color: var(--gray-700); margin: 0 0 12px; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="label">Coral — alma de la marca</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FEF5F4"></div><div class="meta"><div class="name">50</div><div class="hex">#FEF5F4</div></div></div>
    <div class="sw"><div class="chip" style="background:#FDE8E6"></div><div class="meta"><div class="name">100</div><div class="hex">#FDE8E6</div></div></div>
    <div class="sw"><div class="chip" style="background:#F9CFCC"></div><div class="meta"><div class="name">300</div><div class="hex">#F9CFCC</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5B0AD"></div><div class="meta"><div class="name">500</div><div class="hex">#F5B0AD</div></div></div>
    <div class="sw"><div class="chip" style="background:#F08884"></div><div class="meta"><div class="name">700</div><div class="hex">#F08884</div></div></div>
    <div class="sw"><div class="chip" style="background:#ED6864; box-shadow: inset 0 0 0 2px #fff, inset 0 0 0 3px #ED6864"></div><div class="meta"><div class="name">900 ·</div><div class="hex">#ED6864</div></div></div>
    <div class="sw"><div class="chip" style="background:#C14744"></div><div class="meta"><div class="name">950</div><div class="hex">#C14744</div></div></div>
  </div>
</body>
</html>
