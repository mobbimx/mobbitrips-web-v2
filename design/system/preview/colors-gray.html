<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Gray scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border-radius: 14px; overflow: hidden; background: var(--white); box-shadow: var(--shadow-sm); }
  .sw .chip { aspect-ratio: 1.3/1; }
  .sw .meta { padding: 10px 12px; }
  .sw .name { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--gray-900); }
  .sw .hex  { font-family: var(--font-body); font-size: 11px; color: var(--gray-700); margin-top: 2px; }
  .label { font-family: var(--font-display); font-weight: 500; font-size: 14px; color: var(--gray-700); margin: 0 0 12px; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="label">Gray cálido — estructura</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#E8E8E6"></div><div class="meta"><div class="name">100</div><div class="hex">#E8E8E6</div></div></div>
    <div class="sw"><div class="chip" style="background:#DCDCDA"></div><div class="meta"><div class="name">200</div><div class="hex">#DCDCDA</div></div></div>
    <div class="sw"><div class="chip" style="background:#C4C4C4"></div><div class="meta"><div class="name">300</div><div class="hex">#C4C4C4</div></div></div>
    <div class="sw"><div class="chip" style="background:#9A9999"></div><div class="meta"><div class="name">500</div><div class="hex">#9A9999</div></div></div>
    <div class="sw"><div class="chip" style="background:#706F6F"></div><div class="meta"><div class="name">700 ·</div><div class="hex">#706F6F</div></div></div>
    <div class="sw"><div class="chip" style="background:#2D2D2D"></div><div class="meta"><div class="name">900</div><div class="hex">#2D2D2D</div></div></div>
    <div class="sw"><div class="chip" style="background:#1F1F1F"></div><div class="meta"><div class="name">950</div><div class="hex">#1F1F1F</div></div></div>
  </div>
</body>
</html>
