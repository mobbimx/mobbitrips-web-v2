<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--cream); display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 14px; }
  .tag { font-family: var(--font-body); font-weight: 500; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-700); }
  .search-bg { padding: 14px 14px; border-radius: 18px; background: linear-gradient(135deg, #FDE8E6 0%, #F5B0AD 100%); }
  .icon { width: 18px; height: 18px; color: var(--gray-700); }
</style>
</head>
<body>
  <div class="row"><div class="tag">Text · default</div>
    <input class="input-text" placeholder="Tu nombre" />
  </div>
  <div class="row"><div class="tag">Text · focus</div>
    <input class="input-text" value="Xalapa, Veracruz" style="border: 1.5px solid var(--coral-900); outline: 3px solid rgba(237,104,100,0.15);" />
  </div>
  <div class="row"><div class="tag">Search · glass</div>
    <div class="search-bg">
      <div class="input-search">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="¿A dónde viajas?" />
        <button class="btn btn-primary btn-sm">Buscar</button>
      </div>
    </div>
  </div>
</body>
</html>
