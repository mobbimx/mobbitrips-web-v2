<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--cream); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tile { border-radius: 18px; padding: 26px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 150px; }
  .tile img { width: 64px; height: 64px; object-fit: contain; }
  .cream { background: var(--cream); border: 1px solid var(--gray-100); }
  .white { background: var(--white); box-shadow: var(--shadow-sm); }
  .coral { background: var(--coral-900); }
  .dark  { background: var(--charcoal); }
  .wordmark { font-family: var(--font-display); font-weight: 600; font-size: 18px; letter-spacing: -0.01em; }
  .row { display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>
  <div class="tile cream">
    <div class="row"><img src="../assets/logo-coral.png" alt=""><span class="wordmark" style="color: var(--gray-900)">MobbiTrips</span></div>
  </div>
  <div class="tile white">
    <div class="row"><img src="../assets/logo-coral.png" alt=""><span class="wordmark" style="color: var(--gray-900)">MobbiTrips</span></div>
  </div>
  <div class="tile coral">
    <img src="../assets/logo-mark-block.png" alt="" style="background: transparent; border-radius: 12px;">
  </div>
  <div class="tile dark">
    <div class="row"><img src="../assets/logo-coral.png" alt=""><span class="wordmark" style="color: var(--cream)">MobbiTrips</span></div>
  </div>
</body>
</html>
