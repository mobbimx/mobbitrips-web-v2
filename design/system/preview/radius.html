<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--cream); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .cell { text-align: center; }
  .box { background: var(--white); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); aspect-ratio: 1/1; margin-bottom: 8px; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--gray-900); }
  .val  { font-family: var(--font-body); font-size: 11px; color: var(--gray-700); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius: 8px"></div><div class="name">sm</div><div class="val">8 px · inputs</div></div>
    <div class="cell"><div class="box" style="border-radius: 12px"></div><div class="name">md</div><div class="val">12 px · tags</div></div>
    <div class="cell"><div class="box" style="border-radius: 20px"></div><div class="name">lg</div><div class="val">20 px · content</div></div>
    <div class="cell"><div class="box" style="border-radius: 24px"></div><div class="name">xl</div><div class="val">24 px · property</div></div>
    <div class="cell"><div class="box" style="border-radius: 32px"></div><div class="name">2xl</div><div class="val">32 px · panels</div></div>
    <div class="cell"><div class="box" style="border-radius: 999px; background: var(--coral-900); border: none; box-shadow: var(--shadow-coral)"></div><div class="name">full</div><div class="val">999 · pills</div></div>
  </div>
</body>
</html>
