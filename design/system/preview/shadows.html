<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--cream); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .cell { text-align: center; }
  .box { background: var(--white); border-radius: 14px; aspect-ratio: 1/1; margin-bottom: 10px; }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--gray-900); }
  .val  { font-family: var(--font-body); font-size: 10.5px; color: var(--gray-700); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-sm)"></div><div class="name">sm</div><div class="val">subtle</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-md)"></div><div class="name">md</div><div class="val">cards</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-lg)"></div><div class="name">lg</div><div class="val">overlays</div></div>
    <div class="cell"><div class="box" style="box-shadow: var(--shadow-xl)"></div><div class="name">xl</div><div class="val">floating</div></div>
    <div class="cell"><div class="box" style="background: var(--coral-900); box-shadow: var(--shadow-coral)"></div><div class="name">coral</div><div class="val">CTAs</div></div>
    <div class="cell"><div class="box" style="background: rgba(250,247,242,0.65); backdrop-filter: blur(24px); box-shadow: var(--shadow-glass); border: 1px solid rgba(255,255,255,0.5)"></div><div class="name">glass</div><div class="val">liquid</div></div>
  </div>
</body>
</html>
