<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { margin: 0; padding: 28px; background: var(--cream); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .kicker { font-family: var(--font-body); font-weight: 500; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-700); }
</style>
</head>
<body>
  <div>
    <div class="kicker" style="margin-bottom: 8px;">Tag · coral (destacado)</div>
    <div class="row">
      <span class="tag">Favorito</span>
      <span class="tag">Superanfitrión</span>
      <span class="tag">Nuevo</span>
      <span class="tag">-20%</span>
    </div>
  </div>
  <div>
    <div class="kicker" style="margin-bottom: 8px;">Tag · neutral</div>
    <div class="row">
      <span class="tag tag-neutral">Wi-Fi</span>
      <span class="tag tag-neutral">Alberca</span>
      <span class="tag tag-neutral">Pet friendly</span>
      <span class="tag tag-neutral">2 recámaras</span>
    </div>
  </div>
  <div>
    <div class="kicker" style="margin-bottom: 8px;">Tag · outline</div>
    <div class="row">
      <span class="tag tag-outline">Playa</span>
      <span class="tag tag-outline">Montaña</span>
      <span class="tag tag-outline">Centro histórico</span>
    </div>
  </div>
</body>
</html>
