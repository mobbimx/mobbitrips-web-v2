<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Type — Script accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px; background: var(--cream); display: flex; flex-direction: column; gap: 18px; }
  .block { background: var(--white); border-radius: 20px; padding: 26px 30px; box-shadow: var(--shadow-sm); }
  .kicker { font-family: var(--font-body); font-weight: 500; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-700); margin-bottom: 6px; }
  .line { font-family: var(--font-display); font-weight: 600; font-size: 28px; line-height: 1.2; color: var(--gray-950); letter-spacing: -0.02em; }
  .script { font-family: var(--font-script); font-weight: 400; font-size: 42px; color: var(--coral-900); line-height: 1; margin-left: 4px; }
  .rule { font-family: var(--font-body); font-size: 13px; color: var(--gray-700); line-height: 1.5; }
</style>
</head>
<body>
  <div class="block">
    <div class="kicker">Acento emocional · Caveat</div>
    <div class="line">Tu casa, <span class="script">en todas partes</span></div>
    <div class="rule" style="margin-top: 10px;">Máximo una frase por sección. 1.5× del body circundante. Color coral-900.</div>
  </div>
</body>
</html>
