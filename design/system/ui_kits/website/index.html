<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>

<div id="root"></div>

<script type="text/babel" src="NavHero.jsx"></script>
<script type="text/babel" src="Cards.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel">
  const { useEffect } = React;

  function App() {
    useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
    });
    return (
      <>
        <window.Navbar />
        <window.Hero />
        <window.PropertiesSection />
        <window.ManifestoSection />
        <window.DestinationsSection />
        <window.CTABand />
        <window.Footer />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
